{% extends "base.html" %}
{% block title %}Mudar password — wg-admin{% endblock %}
{% block content %}
<h1>Mudar password</h1>
<form method="post" action="{{ url_for('change_password') }}">
  <label>Password atual: <input type="password" name="current" required autocomplete="current-password"></label>
  <label>Nova password: <input type="password" name="new" required minlength="8" autocomplete="new-password"></label>
  <label>Confirmar nova: <input type="password" name="confirm" required minlength="8" autocomplete="new-password"></label>
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
  <button type="submit" onclick="this.disabled=true; this.innerHTML='A guardar…'; this.form.submit();">Guardar</button>
</form>
<p><a href="{{ url_for('peers_list') }}">Voltar</a></p>
{% endblock %}
