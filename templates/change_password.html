{% extends "base.html" %}
{% block title %}Mudar password — wg-admin{% endblock %}
{% block content %}
<div class="container">
  <h1><span class="accent-bar"></span>Mudar password</h1>
  <p class="subtitle">// argon2id · m=16MB · t=3 · p=1</p>

  <form method="post" action="{{ url_for('change_password') }}">
    <label for="current">PASSWORD ATUAL</label>
    <input type="password" id="current" name="current" required autocomplete="current-password">

    <label for="new">NOVA PASSWORD <span class="text-muted text-sm">(mínimo 8 caracteres)</span></label>
    <input type="password" id="new" name="new" required minlength="8" autocomplete="new-password">

    <label for="confirm">CONFIRMAR</label>
    <input type="password" id="confirm" name="confirm" required minlength="8" autocomplete="new-password">

    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
      <button type="submit" onclick="this.disabled=true; this.innerHTML='A guardar…'; this.form.submit();">Guardar</button>
      <a href="{{ url_for('peers_list') }}" class="btn secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
