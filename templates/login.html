{% extends "base.html" %}
{% block title %}Login — wg-admin{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-mark">wg</span>
      <span>wg<span style="color: var(--accent)">-</span>admin</span>
    </div>
    <p class="login-tagline">// wireguard peer management</p>

    <form method="post" action="{{ url_for('login') }}">
      <label for="password">PASSWORD</label>
      <input type="password" id="password" name="password" placeholder="••••••••••••" required autofocus autocomplete="current-password">
      <button type="submit" style="width: 100%; justify-content: center; padding: 0.7rem;">Entrar →</button>
    </form>
  </div>
</div>
{% endblock %}
